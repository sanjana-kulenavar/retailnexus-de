name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-checks:
    name: Python Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install black flake8 pytest

      - name: Check code formatting with Black
        run: |
          black --check --line-length 100 ingestion/ processing/ airflow/ \
            --exclude "venv/|\.git/" || echo "No Python files to check yet"

      - name: Lint with Flake8
        run: |
          flake8 ingestion/ processing/ airflow/ \
            --max-line-length 100 \
            --exclude=venv,.git \
            --count || echo "No Python files to lint yet"

      - name: Run tests
        run: |
          pytest processing/tests/ -v || echo "No tests yet — this is expected at Phase 1"
